- theorem_name: orphan_acknowledgment
  theorem_id: orphan_acknowledgment
  lean_status: axiomatized
  fsl_phrase: null
  fsl:
    phrase: null
    symbols:
    - all_passed
    - Ack_∅
    - ∂G
    - ¬
    - →
    - ∀
    - ∈
    - ∅
  statement: 'For every mission m in the acknowledged orphan set Ack_∅, membership
    bars a Gödelian boundary violation. The living specification boundary (∂G) holds
    modulo Ack_∅: ∀m: Ack_∅(m) → ¬(m ∈ GBound_violated). Companion to goedel_boundary_final
    — that theorem shows GBound → ¬all_passed; this axiom closes the gap for acknowledged
    lifecycle orphans.'
  explains:
    plain_english: 'A mission in the formal acknowledgment set does not create a Gödelian
      boundary violation. The gap is acknowledged as a base axiom rather than proved
      away — the same move Gödel himself described: some truths enter formal systems
      as axioms at the boundary.'
- theorem_id: derivation_implies_boundary
  theorem_name: derivation_implies_boundary
  lean_status: proved
  fsl_phrase: FSL_derivation → ¬all_passed
  fsl:
    phrase: FSL_derivation → ¬all_passed
    symbols:
    - all_passed
    - ↦_FSL → ∂G
    - ↦_FSL
    - ∂G
    - ¬
    - →
  statement: 'If a derivation relationship holds (↦_FSL — some implementation construct
    maps to an FSL symbol), the mission cannot internally pass. The derivation is
    witnessed externally: it requires external chain confirmation at the Gödel boundary
    (∂G). Proved by composing derivation_boundary_anchored and goedel_boundary_final.'
  explains:
    plain_english: Any implementation-to-FSL derivation is boundary-anchored. The
      existence of a ↦_FSL mapping implies ∂G holds, which by goedel_boundary_final
      implies ¬all_passed. The internal gate chain cannot confirm its own derivation
      sources — that confirmation lives in the StateProof chain outside the system.
- theorem_id: sync_chain_sound
  theorem_name: sync_chain_sound
  lean_status: proved
  fsl_phrase: FSL_sync → ℒ_FSL ∧ Δ_FSL ∧ SP ∧ ¬all_passed
  fsl:
    phrase: FSL_sync → ℒ_FSL ∧ Δ_FSL ∧ SP ∧ ¬all_passed
    symbols:
    - ⊕_sync → Δ_FSL
    - all_passed
    - Δ_FSL → ∂G
    - ⊕_sync
    - ℒ_FSL
    - Δ_FSL
    - SP
    - ∂G
    - ∧
    - ¬
    - →
  statement: 'A FSL synchronization event (⊕_sync) entails the living specification
    (ℒ_FSL), a symbol delta (Δ_FSL), a StateProof (SP), and that the mission cannot
    internally pass (¬all_passed). Proved by chaining: sync_produces_delta gives Δ_FSL;
    delta_requires_spec gives ℒ_FSL; delta_requires_chain gives SP; delta_boundary_anchored
    + boundary_implies_ext + ext_auth_blocks gives ¬all_passed.'
  explains:
    plain_english: 'Sync is the complete FSL write cycle. By proving that ⊕_sync implies
      ℒ_FSL ∧ Δ_FSL ∧ SP ∧ ¬all_passed, this theorem encodes the full dependency chain:
      you cannot have a valid FSL sync without a living specification to diff, a StateProof
      to anchor it, and external authority (∂G) to witness it. The sync event is the
      operational expression of the Gödel boundary — every FSL evolution requires
      external countersign.'
