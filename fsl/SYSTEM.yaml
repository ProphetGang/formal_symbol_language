  file: fsl/export_lean.py
  added_by: MISSION-FSL-LEAN-EXPORTER
  upgraded_by: MISSION-LEAN-MATHLIB-UPGRADE
  public_api:
  - export_lean(ast, name="fsl_expr") -> str
  lean_target: Mathlib
  corrected_by: MISSION-LEAN-EXPORTER-FIX
  mathlib_imports:
  - Mathlib.Logic.Basic
  - Mathlib.Data.Part
  - Mathlib.Order.OmegaCompletePartialOrder
  - Mathlib.Order.FixedPoints
  tier_coverage:
    A_B: Prop — decide/tauto/norm_num (fully automated)
    C: Part α (Mathlib.Data.Part) — simp with Part lemmas
    D: OmegaCompletePartialOrder — axioms at Gödel boundary
  output: self-contained Lean 4 + Mathlib source file; all 4 tiers formally typed
- module: fsl.semantics
  file: fsl/semantics.py
  added_by: MISSION-FSL-SEMANTICS
  public_api:
  - evaluate(ast, env=None, registry=None) -> Value
  - describe(v) -> str
  - Environment
  - 'Value subclasses: Top, Bottom, Unknown, ExternalAuthority, Defined, Undefined,
    ScottElement'
  domain_model:
    tier_A_B: BoolLattice — Top | Bottom | Unknown (Kleene strong three-valued logic)
    tier_C: PartialDomain — Defined(inner) | Undefined
    tier_D: ScottDomain — ScottElement(label, fixpoint, data); fixed-point ordering
