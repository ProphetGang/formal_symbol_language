version: '1.0'
created_at: '2026-05-07'
authority: symbolic
ratified_by: AMD-FSL-SIXTH-SURFACE
schema_contract:
  purpose: Non-enforcing additive metadata contract for FSL symbol hardening.
  status: proposed
  introduced_by: UPD-FSL-SCHEMA-HARDENING-CONTRACT
  runtime_compatibility:
    existing_fields_remain_authoritative: true
    parser_reads_existing_symbol_field: true
    validator_reads_existing_symbol_and_theorem_fields: true
    lean_export_reads_current_parser_ast: true
    rust_runtime_reads_existing_sort_guard_and_violation_fields: true
    governance_decisions_ignore_new_metadata_fields: true
  additive_symbol_fields:
    canonical_id:
      required_now: false
      type: string
      stability: immutable_after_assignment
      description: Stable machine identifier for a symbol entry. It must not replace
        the existing symbol field or theorem references without a separately governed
        compatibility mission.
      suggested_format: <bundle_id>.<stable_name>
    family:
      required_now: false
      type: string
      description: Documentation grouping for readers, publishers, and external tooling.
        It is metadata only until separately governed.
      allowed_values:
      - boundary
      - governance
      - theorem
      - packet
      - runtime
      - widget
      - observer
      - topology
      - logic
      - set
      - numeric
      - metric
      - constitution
      - network
      - fsl_meta
    kind:
      required_now: false
      type: string
      description: Indicates whether a registry entry is an indivisible atom or a
        composite expression-like entry. This field is descriptive and must not change
        parser behavior in this contract mission.
      allowed_values:
      - atomic
      - composite
    display:
      required_now: false
      type: object
      description: Presentation metadata for documentation and publication. Runtime
        lookup remains bound to the existing symbol field.
      fields:
        glyph: string
        text: string
        mode:
          type: string
          allowed_values:
          - glyph
          - text
          - mixed
  non_goals:
  - Do not remove or rename existing fields.
  - Do not change symbol lookup semantics.
  - Do not change parser output.
  - Do not change theorem identifiers or Lean declarations.
  - Do not change Rust runtime validation.
  - Do not change governance authorization or admissibility decisions.
glyph_candidate_contract:
  purpose: Proposal-only symbolic evolution layer for English-derived FSL symbols.
  status: proposed
  introduced_by: UPDATE-FSL-GLYPH-CANDIDATE-SYMBOLPACKETS
  authority:
    symbol_packet_channel: MISSION-FSL-UNIVERSAL-CHANNEL
    governance_symbol: K_packet_auth
    promotion_requires: future_update_packet
  runtime_compatibility:
    active_symbol_field_remains_authoritative: true
    canonical_id_remains_stable: true
    parser_ignores_glyph_candidate: true
    validator_ignores_glyph_candidate_for_acceptance: true
    lean_export_ignores_glyph_candidate: true
    rust_runtime_ignores_glyph_candidate: true
    governance_decisions_ignore_glyph_candidate: true
  fields:
    glyph: Proposed publication/display glyph. It is not a lookup key.
    status:
      type: string
      allowed_values:
      - proposed
      - reserved
      - rejected
      - promoted
    glyph_family: Human-readable lineage used to evaluate visual consistency.
    rationale: Short reason this glyph shape was proposed.
    proposed_by_packet: UpdatePacket that introduced the proposal.
    governance_authority: FSL governance symbol authorizing candidate metadata.
    promotion_requires: Future UpdatePacket required before active symbol replacement.
  non_goals:
  - Do not replace existing symbol values.
  - Do not rename theorem IDs or Lean declarations.
  - Do not introduce custom Unicode authority or font requirements.
  - Do not make glyph candidates parser, validator, runtime, or governance inputs.
glyph_promotion_policy:
  purpose: Non-enforcing gate for future promotion of glyph_candidate metadata into
    active symbols.
  status: proposed
  introduced_by: UPDATE-FSL-GLYPH-PROMOTION-POLICY-GATE
  authority:
    governance_symbol: K_packet_auth
    promotion_requires: future_update_packet
  gate_values:
    promotable_now: Candidate has no active symbol binding and may be considered for
      promotion by a future UpdatePacket.
    display_only: Candidate may be used for documentation or publication display,
      but should not replace the active symbol.
    blocked: Candidate is attached to load-bearing, boundary, governance, or parser-shaped
      semantics and must not be promoted under this policy.
    requires_alias_plan: Candidate could be considered only with an explicit compatibility
      plan for legacy symbol aliases and theorem references.
  default_gate:
    future_replacement_candidate: promotable_now
    mixed_glyph_candidate: display_only_unless_alias_plan
    never_replace_load_bearing: blocked
    keep_text: not_applicable_without_candidate
  promotable_now_requires:
  - glyph_candidate.status == proposed
  - glyph_candidate.governance_authority == K_packet_auth
  - readiness_classification == future_replacement_candidate
  - active_symbol_is_missing_or_unbound
  - no tier_d_boundary
  - no load_bearing_family
  - no composite_or_parser_shaped_symbol
  - no governance_guard_or_violation_symbol
  blocked_if:
  - tier_d_boundary
  - load_bearing_family
  - composite_or_parser_shaped_symbol
  - governance_guard_or_violation_symbol
  requires_alias_plan_if:
  - lean_theorem_reference
  - appears_in_theorems
  - active_symbol_field_exists
  alias_plan_required_fields:
  - legacy_symbol
  - promoted_symbol
  - theorem_alias_resolution
  - parser_backward_compatibility
  - lean_reference_compatibility
  - rust_runtime_compatibility
  - governance_decision_compatibility
  runtime_compatibility:
    active_symbol_field_remains_authoritative: true
    parser_ignores_promotion_gate: true
    validator_ignores_promotion_gate_for_acceptance: true
    lean_export_ignores_promotion_gate: true
    rust_runtime_ignores_promotion_gate: true
    governance_decisions_ignore_promotion_gate: true
  non_goals:
  - Do not promote any glyph in this mission.
  - Do not change active symbol values.
  - Do not rename theorem IDs or Lean declarations.
  - Do not make promotion gates parser, validator, runtime, or governance inputs.
  - Do not regenerate publication exports in this mission.
ess_s_formula:
  description: "ESS-S = w1*surface_convergence + w2*role_determinism\n      + w3*proof_term_mappability\
    \ + w4*constitutional_stability\n      - w5*overload_penalty\n"
  weights:
    w1_surface_convergence:
      value: 0.2
      enforces: R4 (queryable_surfaces_fixed)
      breaking_risk: HIGH
      definition: 'Fraction of truth surfaces that recognize the symbol without ambiguity.
        convergence = |surfaces_recognizing| / |surfaces_using|

        '
    w2_role_determinism:
      value: 0.2
      enforces: R5 (roles_do_not_bleed)
      breaking_risk: HIGH
      definition: 'Probability the symbol maps to exactly one role''s permitted_actions.
        High when symbol is scoped to a single role; low when shared across roles.

        '
    w3_proof_term_mappability:
      value: 0.3
      enforces: R3 (CRITICAL) + R8 (HIGH)
      breaking_risk: CRITICAL
      definition: 'Whether the symbol has a canonical mapping to a proof term type
        in .governance/proof_terms/. 1.0 = direct proof-emitting operation; 0.5 =
        indirect participant; 0.0 = no proof term possible.

        '
    w4_constitutional_stability:
      value: 0.25
      enforces: R1 + R3 + R6 (all CRITICAL)
      breaking_risk: CRITICAL
      definition: '(amendment_survival_count / total_amendments) x (1 - usage_variance).
        Symbols renamed or redefined in any amendment receive a score reset.

        '
    w5_overload_penalty:
      value: 0.05
      definition: 'Fraction of contexts where the symbol carries conflicting denotations.
        Computed from mission log analysis across all recorded uses.

        '
  tier_thresholds:
    A:
      min: 85
      max: 100
      treatment: Universal. No bundle required. Directly usable in proof terms.
    B:
      min: 70
      max: 84
      treatment: Typed. Bundle declaration recommended. Proof terms allowed.
    C:
      min: 50
      max: 69
      treatment: Contextual. Bundle declaration required. Disambiguation enforced.
    D:
      min: 0
      max: 49
      treatment: Unstable. Rejected without active bundle. Cannot appear in proof
        terms.
