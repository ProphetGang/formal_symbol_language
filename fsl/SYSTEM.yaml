    description: 'Cryptographic assumptions in SiMON''s formal system (U1-Crypto tier).
      These propositions are computationally hard — not provable internally, not Gödelian
      (a concrete collision would falsify them), and not runtime-enforced. Distinct
      from simon.axioms.v1 (runtime invariants) and simon.fsl.v1 (boundary symbols).

      '
    symbols:
    - symbol: ComputationallyBinding(commit)
      name: sha256_binding
      canonical_id: simon.crypto.v1.sha256_binding
      family: theorem
      kind: composite
      display:
        glyph: ComputationallyBinding(commit)
        text: computationally binding commitment
        mode: text
      ess_s: 72
      tier: C
      sort: Prop
      lean_axiom: sha256_binding_assumption
      lean_file: lean/gbo_theorems.lean
      proof_status: axiomatized
      semantics: 'SHA-256-based commitment is computationally binding: no efficient
        algorithm can find distinct g₁ ≠ g₂ with commit g₁ = commit g₂. Cryptographic
        assumption — unprovable internally. Replaces the false gbo_vi_commitment_injective
        (injectivity is false by pigeonhole). Requires bundle(simon.crypto.v1) active
        in scope.

        '
      english_phrases:
      - computationally binding
      - SHA-256 binding
      - commitment binding
      - hash binding
      - collision resistant
      related:
      - SP
      - DID
      - 𝒜
