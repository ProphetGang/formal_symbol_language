      check_cmd: cd lean && ~/.elan/bin/lake env ~/.elan/bin/lean governance_theorems.lean
    fsl:
      phrase: null
      symbols:
      - ESS-S
    explains:
      plain_english: ESS-S scores measure the centrality of FSL symbols across the
        theorem corpus. mission_sound is the highest-coverage theorem, requiring all
        9 rules simultaneously. The ESS-S formula (w_R×R + w_T×T + w_C×C + w_E×E)
        quantifies how essential each symbol is to the formal reasoning infrastructure.
    depends_on:
      proved:
      - mission_sound
      axioms: []
      boundary: []
    ui_contexts: []
  fsl_meta_bundle_tier:
    theorem_name: FSL Bundle and Tier Structure
    lean:
      file: lean/governance_theorems.lean
      declaration: surfaces_imply_invariants
      status: proved
      check_cmd: cd lean && ~/.elan/bin/lake env ~/.elan/bin/lean governance_theorems.lean
    fsl:
      phrase: null
      symbols:
      - bundle(b)
      - tier(s)
    explains:
      plain_english: bundle(b) refers to a named FSL symbol bundle (e.g. simon.governance.v1).
        tier(s) is the ESS-S tier (A/B/C/D) of symbol s. surfaces_imply_invariants
        witnesses the bundle-tier relationship — the surface registry 𝒮 is itself
        a Tier-A structure, and every bundle is a subset of the full FSL governed
        by the surface-invariant inclusion chain.
    depends_on:
      proved:
      - surfaces_imply_invariants
      axioms: []
      boundary: []
    ui_contexts: []
  fsl_godel_coverage:
    theorem_name: FSL Godel Boundary Coverage
    lean:
      file: lean/governance_theorems.lean
      declaration: goedel_boundary_final
      status: proved
      check_cmd: cd lean && ~/.elan/bin/lake env ~/.elan/bin/lean governance_theorems.lean
    fsl:
      phrase: null
      symbols:
      - ℒ_FSL
      - ∂G
      - ⊥_ext
      - ↦_FSL
      - Δ_FSL
      - ⊕_sync
    explains:
      plain_english: 'goedel_boundary_final (GBound → ¬all_passed) witnesses ∂G —
        the Gödel boundary is the condition under which the internal gate chain cannot
        pass. boundary_blocks_pass witnesses ⊥_ext. ℒ_FSL (the living spec) is axiomatized
        at the same boundary — the system cannot prove its own consistency (Gödel''s
        second incompleteness theorem). ↦_FSL (derivation source), Δ_FSL (FSL delta),
        and ⊕_sync (sync event) are similarly boundary-anchored: they depend on external
        chain state that the internal system cannot verify.'
    depends_on:
      proved:
      - goedel_boundary_final
      - boundary_blocks_pass
      axioms: []
      boundary:
      - ∂G
      - ⊥_ext
      - ℒ_FSL
    ui_contexts: []
